appId: com.talaat.market
productName: Talaat Market
copyright: Copyright © 2026 Talaat Market
electronVersion: 39.8.10

# Files to include in the package
files:
  - dist/**/*
  - node_modules/**/*
  - package.json

# Include the built client and server from the monorepo
extraResources:
  - from: "../client/dist"
    to: "client/dist"
  - from: "../server/dist"
    to: "server/dist"
  - from: "../../node_modules"
    to: "node_modules"
    filter:
      - "**/*"
  - from: "../../vendor/postgres/win-x64"
    to: "postgres/win-x64"
    filter:
      - "**/*"

# Build output directory
directories:
  output: release
  buildResources: resources

# ── Windows ──────────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch:
        - x64
  # App-managed bundled PostgreSQL runs without a Windows service.
  requestedExecutionLevel: asInvoker

nsis:
  oneClick: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Talaat Market
  menuCategory: Business

# ── Linux ─────────────────────────────────────────────────────────
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: resources/icon.png
  category: Office
  description: Supermarket Management System
  maintainer: Talaat Market <admin@talaatmarket.local>

deb:
  depends:
    - "postgresql-client"
  # afterInstall: scripts/postinstall.sh

